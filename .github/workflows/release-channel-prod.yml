---
name: release channel (prod)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  ff-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.ref }}
          check-name: 'build (full)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.ref }}
          check-name: 'deploy'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: |
          git checkout prod
          git merge --ff-only ${{ github.ref_name }}

      - uses: ad-m/github-push-action@v1.1.0
        with:
          branch: prod

  deploy-repo:
    # We call this workflow manually because it doesn't appear to be triggered automatically by a
    # push of the prod branch from the ff-branch job:
    uses: ./.github/workflows/deploy-prod.yml
    needs: ff-branch
    secrets: inherit
